# Logrotate for OSM Notes Analytics (same layout as sibling projects: osm-notes-ingestion, osm-notes-monitoring).
# Logs live under /var/log/osm-notes-analytics/; rotation by logrotate (cron.daily).
#
# Installation (as root):
#   sudo mkdir -p /var/log/osm-notes-analytics
#   sudo chown notes:maptimebogota /var/log/osm-notes-analytics
#   sudo chmod 2775 /var/log/osm-notes-analytics
#   sudo touch /var/log/osm-notes-analytics/analytics.log
#   sudo chown notes:maptimebogota /var/log/osm-notes-analytics/analytics.log
#   sudo chmod 640 /var/log/osm-notes-analytics/analytics.log
#
#   sudo cp etc/logrotate.osm-analytics.conf /etc/logrotate.d/osm-analytics
#   sudo chmod 644 /etc/logrotate.d/osm-analytics
#
# Cron then logs to: /var/log/osm-notes-analytics/analytics.log
# Rotated files: analytics.log-YYYYMMDD.gz (same style as osm-notes-monitoring).
#
# Test: sudo logrotate -d /etc/logrotate.d/osm-analytics
# Force: sudo logrotate -f /etc/logrotate.d/osm-analytics
#
# If your server has no group maptimebogota, use create 0640 notes notes and chown notes:notes.
#
# Author: Andres Gomez (AngocA)

/var/log/osm-notes-analytics/analytics.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    create 0640 notes maptimebogota
}
